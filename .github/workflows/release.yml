name: Build and Release

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build sysbox-runc (${{ matrix.target_arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_arch: amd64
            runner: ubuntu-latest
            docker_platform: linux/amd64
          - target_arch: arm64
            runner: ubuntu-24.04-arm
            docker_platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init required submodules
        run: git submodule update --init sysbox-runc sysbox-libs

      - name: Build sysbox-runc via Docker
        run: |
          mkdir -p sysbox-runc-bin/${{ matrix.target_arch }}
          docker run --rm \
            --platform ${{ matrix.docker_platform }} \
            -v "$(pwd)/sysbox-runc":/workspace/sysbox-runc:ro \
            -v "$(pwd)/sysbox-libs":/workspace/sysbox-libs:ro \
            -v "$(pwd)/sysbox-runc-bin/${{ matrix.target_arch }}":/out \
            golang:1.24-bookworm \
            bash -c "
              set -e
              apt-get update -qq
              apt-get install -y -qq libseccomp-dev libapparmor-dev git protobuf-compiler
              go install github.com/golang/protobuf/protoc-gen-go@v1.5.4
              export PATH=\$PATH:\$(go env GOPATH)/bin
              cd /workspace
              git clone --depth 1 https://github.com/nestybox/sysbox-ipc.git
              protoc -I sysbox-ipc/sysboxFsGrpc/sysboxFsProtobuf \
                --go_out=plugins=grpc:sysbox-ipc/sysboxFsGrpc/sysboxFsProtobuf \
                sysbox-ipc/sysboxFsGrpc/sysboxFsProtobuf/sysboxFsProtobuf.proto
              protoc -I sysbox-ipc/sysboxMgrGrpc/sysboxMgrProtobuf \
                --go_out=plugins=grpc:sysbox-ipc/sysboxMgrGrpc/sysboxMgrProtobuf \
                sysbox-ipc/sysboxMgrGrpc/sysboxMgrProtobuf/sysboxMgrProtobuf.proto
              cd sysbox-runc
              go build -buildvcs=false -trimpath -buildmode=pie \
                -tags 'seccomp apparmor' \
                -o /out/sysbox-runc .
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysbox-runc-${{ matrix.target_arch }}
          path: sysbox-runc-bin/${{ matrix.target_arch }}/sysbox-runc

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Rename binaries with arch suffix
        run: |
          for arch in amd64 arm64; do
            cp "dist/sysbox-runc-${arch}/sysbox-runc" "dist/sysbox-runc-${arch}"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.sha }}
          name: "v${{ steps.version.outputs.version }} (${{ github.sha }})"
          body: |
            Automated build from commit ${{ github.sha }}.

            ## Binaries

            | Binary | Architecture |
            |--------|-------------|
            | `sysbox-runc-amd64` | x86-64 |
            | `sysbox-runc-arm64` | ARM 64-bit |

            ## Install

            ```bash
            ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
            curl -fsSL -o /usr/local/sbin/sysbox-runc \
              https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}-${{ github.sha }}/sysbox-runc-${ARCH}
            chmod +x /usr/local/sbin/sysbox-runc
            ```
          files: |
            dist/sysbox-runc-amd64
            dist/sysbox-runc-arm64
